# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  reaping_frequency: 10
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# PostgreSQL for production. Versions 12.0 and up are supported.
#   gem install pg
#
#   Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
production:
  primary:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
    reaping_frequency: 10
    timeout: 5000
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    username: <%= ENV.fetch("DB_USERNAME", "forge") %>
    password: <%= ENV.fetch("DB_PASSWORD", "") %>
    database: <%= ENV.fetch("DB_NAME", "forge_production") %>
  cache:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
    reaping_frequency: 10
    timeout: 5000
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    username: <%= ENV.fetch("DB_USERNAME", "forge") %>
    password: <%= ENV.fetch("DB_PASSWORD", "") %>
    database: <%= ENV.fetch("DB_CACHE_NAME", "forge_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
    reaping_frequency: 10
    timeout: 5000
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    username: <%= ENV.fetch("DB_USERNAME", "forge") %>
    password: <%= ENV.fetch("DB_PASSWORD", "") %>
    database: <%= ENV.fetch("DB_QUEUE_NAME", "forge_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
    reaping_frequency: 10
    timeout: 5000
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    username: <%= ENV.fetch("DB_USERNAME", "forge") %>
    password: <%= ENV.fetch("DB_PASSWORD", "") %>
    database: <%= ENV.fetch("DB_CABLE_NAME", "forge_production_cable") %>
    migrations_paths: db/cable_migrate
